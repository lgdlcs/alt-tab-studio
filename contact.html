<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Alt Tab Studio</title>
  <meta name="description" content="Contactez Alt Tab Studio pour votre projet de site vitrine.">
  <link rel="icon" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Alt Tab Studio</a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html#services">Services</a></li>
        <li><a href="index.html#process">Comment ça marche</a></li>
        <li><a href="index.html#realisations">Réalisations</a></li>
      </ul>
    </div>
  </nav>
  <section class="section" style="padding-top: 120px;">
    <div class="container">
      <h2 class="section-title">Parlons de votre projet</h2>
      <p class="section-sub">Un message suffit. On revient vers vous sous 24h.</p>
      <form class="contact-form" action="https://formsubmit.co/legrand.lucas0@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="Nouveau contact — Alt Tab Studio">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://lgdlcs.github.io/alt-tab-studio/">
        <div class="form-row">
          <input type="text" name="name" placeholder="Votre nom" required>
          <input type="email" name="email" placeholder="Votre email" required>
        </div>
        <input type="text" name="activity" placeholder="Votre activité (ex: restaurant, artisan, école...)">
        <textarea name="message" placeholder="Décrivez brièvement votre besoin..." rows="4" required></textarea>
        <button type="submit" class="btn btn-primary btn-full">Envoyer</button>
      </form>
    </div>
  </section>
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <p class="footer-logo">Alt Tab Studio</p>
        <p class="footer-sub">Sites vitrines sur mesure · Haute-Savoie</p>
        <p class="footer-copy">© 2026 Alt Tab Studio</p>
      </div>
    </div>
  </footer>
  <script src="script.js"></script>
</body>
</html>
